<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>訂餐系統</title>
</head>
<body>
  <h2>訂餐系統</h2>

  <form id="orderForm">
    <label>帳號</label><br>
    <input type="text" name="account" required><br><br>

    <label>密碼</label><br>
    <input type="text" name="password" required><br><br>

    <label>金額</label><br>
    <input type="number" name="amount" required><br><br>

    <label>備註</label><br>
    <input type="text" name="note"><br><br>

    <button type="submit">送出</button>
  </form>

  <p id="msg"></p>

  <script>
document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    account: this.account.value,
    password: this.password.value,
    amount: this.amount.value,
    note: this.note.value
  };

 fetch("https://script.google.com/macros/s/AKfycbzRWN7xLiseVnnNg4moxOYKwJ_z9iRuf65n67p2oq7ue5ifBRLXzaNN30fi6v9wpktd/exec", {
  method: "POST",
  mode: "no-cors",
  headers: {
    "Content-Type": "application/x-www-form-urlencoded"
  },
  body: new URLSearchParams({
    account: data.account,
    password: data.password,
    amount: data.amount,
    note: data.note
  })
});

  // ✅ 直接顯示成功（因為拿不到回應）
  document.getElementById("msg").innerText = "送出成功！";
});
</script>
</body>
</html>
