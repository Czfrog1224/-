<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>訂餐系統</title>
</head>
<body>
  <h2>訂餐系統</h2>

  <form id="orderForm">
    <label>帳號</label><br>
    <input type="text" name="account" required><br><br>

    <label>密碼</label><br>
    <input type="text" name="password" required><br><br>

    <label>金額</label><br>
    <input type="number" name="amount" required><br><br>

    <label>備註</label><br>
    <input type="text" name="note"><br><br>

    <button type="submit">送出</button>
  </form>

  <p id="msg"></p>

  <script>
document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    account: this.account.value,
    password: this.password.value,
    amount: this.amount.value,
    note: this.note.value
  };

  // ✅ 用 no-cors（關鍵）
  fetch("https://script.google.com/macros/s/AKfycbyfXHRr7u84dx1BbNeY2s7MycMtvWwcxFm2iP9tL9PukBSBoqTZ5RNQ-3ybgwbdofPe/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  // ✅ 直接顯示成功（因為拿不到回應）
  document.getElementById("msg").innerText = "送出成功！";
});
</script>
</body>
</html>
